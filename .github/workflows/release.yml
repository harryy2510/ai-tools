# semantic-release on main: conventional commits → version, changelog, tag, npm.
# npm Trusted Publisher must point at this workflow file: release.yml
# Package: @harryy/ai-tools · Repo: harryy2510/ai-tools
# No NPM_TOKEN / NODE_AUTH_TOKEN — OIDC only (id-token: write).
name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Avoid re-entry on the bot's chore(release) commit
    if: >-
      ${{ !contains(github.event.head_commit.message || '', 'chore(release)')
      && !contains(github.event.head_commit.message || '', '[skip ci]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # Do NOT set registry-url — it writes //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
          # which forces token auth and breaks OIDC Trusted Publishing.

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install
        run: bun install --frozen-lockfile

      - name: Drop token auth that would shadow OIDC
        run: |
          set -euo pipefail
          # Ensure no empty/invalid token path is used by @semantic-release/npm
          unset NPM_TOKEN NODE_AUTH_TOKEN || true
          rm -f "$HOME/.npmrc" .npmrc
          # Prefer public registry without auth for installs already done via bun
          npm config delete //registry.npmjs.org/:_authToken 2>/dev/null || true

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: '0'
          # Explicitly clear — GitHub org secrets named NPM_TOKEN would break OIDC
          NPM_TOKEN: ''
          NODE_AUTH_TOKEN: ''
        # prepublishOnly runs check + build before npm publish
        run: bunx semantic-release
