# Publish to npm via Trusted Publisher (OIDC). No NPM_TOKEN secret.
#
# npm package settings → Trusted Publisher must point at this workflow file
# (publish.yml), not ci.yml. Repo: harryy2510/ai-tools
#
# Triggers: GitHub Release published, or manual workflow_dispatch.
name: publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag'
        required: false
        default: latest

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node (npm CLI + OIDC registry)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install
        run: bun install --frozen-lockfile

      - name: Check and build
        run: bun run prepublishOnly

      - name: Publish to npm (OIDC trusted publisher)
        # No NODE_AUTH_TOKEN. npm exchanges the job OIDC token with the
        # Trusted Publisher link configured on the package.
        run: |
          TAG="${{ github.event.inputs.tag || 'latest' }}"
          npm publish --access public --tag "$TAG" --provenance
