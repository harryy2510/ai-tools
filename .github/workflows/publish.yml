name: publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional npm dist-tag (default latest)'
        required: false
        default: latest

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node (npm provenance)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: bun install --frozen-lockfile

      - name: Check and build
        run: bun run prepublishOnly

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || 'latest' }}"
          npm publish --access public --tag "$TAG" --provenance
